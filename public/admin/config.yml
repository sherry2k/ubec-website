# Netlify CMS Configuration
# Access admin at: your-site.com/admin

backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Type", name: "type", widget: "select", options: ["Commercial Tower", "Luxury Villa", "Residential", "Industrial", "Mosque", "Mixed-use"] }
      - { label: "Status", name: "status", widget: "select", options: ["Completed", "In Progress"] }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Services", name: "services", widget: "list" }

  - name: "tenders"
    label: "Tenders"
    folder: "content/tenders"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Submission Date", name: "submissionDate", widget: "date" }
      - { label: "Drawings Link", name: "drawingsLink", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }

  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Icon", name: "icon", widget: "select", options: ["Building2", "Columns3", "Zap", "ShieldCheck", "ClipboardList", "HardHat", "Palette", "Box", "Calculator", "BarChart3", "RefreshCw"] }

  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    fields:
      - { label: "Client Name", name: "name", widget: "string" }
      - { label: "Company", name: "company", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Testimonial", name: "text", widget: "text" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "contact"
        label: "Contact Information"
        file: "content/settings/contact.json"
        fields:
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Working Hours", name: "workingHours", widget: "string" }
